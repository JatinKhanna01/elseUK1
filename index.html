<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elsevier Customer Portal — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --navy:#002B5C;--navy2:#00407A;--orange:#FF6900;--orange2:#FF8C40;
    --bg:#F0F2F5;--white:#FFFFFF;--border:#E4E7ED;
    --text:#1A1F36;--muted:#6B7280;--success:#10B981;--warn:#F59E0B;
    --red:#EF4444;
  }
  body{background:#CBD0D8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'DM Sans',sans-serif;padding:32px 0 60px;overflow-x:hidden;}
  ::-webkit-scrollbar{display:none;}
  input,button{font-family:'DM Sans',sans-serif;outline:none;border:none;}
  button{cursor:pointer;background:none;}

  .phone-wrap{position:relative;}
  .phone{
    width:390px;height:844px;background:var(--bg);
    border-radius:50px;overflow:hidden;position:relative;
    box-shadow:0 60px 140px rgba(0,0,0,0.5),0 0 0 2px #111,0 0 0 6px #2a2a2a,inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .notch{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#111;border-radius:0 0 20px 20px;z-index:200;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .notch-cam{width:10px;height:10px;border-radius:50%;background:#1c1c1c;border:2px solid #333;}
  .notch-bar{width:60px;height:4px;border-radius:2px;background:#1c1c1c;}

  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    transition:opacity 0.22s ease, transform 0.22s ease;
    opacity:0;pointer-events:none;transform:translateX(20px);
  }
  .screen.active{opacity:1;pointer-events:all;transform:translateX(0);}
  .screen.back{transform:translateX(-20px);}

  .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10;}

  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}

  /* Bottom nav */
  .bottom-nav{
    position:absolute;bottom:0;left:0;right:0;height:76px;
    background:var(--white);border-top:1px solid var(--border);
    display:flex;z-index:50;
    box-shadow:0 -8px 32px rgba(0,0,0,0.06);
    padding-bottom:8px;
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:6px 0 0;position:relative;
  }
  .nav-label{font-size:9.5px;font-weight:500;letter-spacing:0.04em;margin-top:1px;}
  .nav-pip{width:18px;height:2.5px;border-radius:2px;background:var(--orange);position:absolute;top:0;}

  /* Cards */
  .card{background:var(--white);border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
  .card-sm{background:var(--white);border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,0.06);}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:0.04em;}
  .badge-warn{background:#FEF3C7;color:#92400E;}
  .badge-ok{background:#D1FAE5;color:#065F46;}
  .badge-new{background:var(--orange);color:var(--white);}

  /* Inputs */
  .field-wrap{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:0 14px;height:52px;transition:border-color 0.15s;}
  .field-wrap:focus-within{border-color:var(--orange);}
  .field-wrap input{flex:1;background:none;border:none;font-size:15px;color:var(--text);}
  .field-wrap input::placeholder{color:var(--muted);}

  /* Primary button */
  .btn-primary{
    width:100%;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--orange),var(--orange2));
    color:var(--white);font-size:15px;font-weight:700;
    box-shadow:0 8px 24px rgba(255,105,0,0.35);
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:opacity 0.15s,transform 0.1s;
  }
  .btn-primary:active{opacity:0.88;transform:scale(0.98);}
  .btn-secondary{
    width:100%;height:46px;border-radius:12px;
    background:rgba(0,43,92,0.07);border:1.5px solid rgba(0,43,92,0.12);
    color:var(--navy);font-size:14px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }

  /* Toggle */
  .toggle{width:46px;height:26px;border-radius:13px;padding:3px;display:flex;align-items:center;transition:background 0.2s;border:none;cursor:pointer;}
  .toggle-thumb{width:20px;height:20px;border-radius:50%;background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:transform 0.2s;}

  /* Section header */
  .sec-head{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:12px;}

  /* Stat boxes */
  .stat-box{background:var(--bg);border-radius:13px;padding:13px 10px;text-align:center;flex:1;}
  .stat-val{font-family:'Libre Baskerville',serif;font-size:21px;font-weight:700;color:var(--navy);}
  .stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

  /* Modal overlay */
  .overlay{
    position:absolute;inset:0;background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px);z-index:100;
    display:flex;flex-direction:column;justify-content:flex-end;
  }
  .sheet{background:var(--white);border-radius:24px 24px 0 0;padding:12px 22px 40px;max-height:88%;}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp 0.28s ease both;}
</style>
</head>
<body>
<div class="phone-wrap">
  <div class="phone" id="app">
    <div class="notch"><div class="notch-cam"></div><div class="notch-bar"></div></div>
  </div>
</div>

<script>

function svg(name,size=18,color='#002B5C',sw=1.8){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${IC[name]||''}</svg>`;
}

// ─── STATE ───────────────────────────────────────────────
let S={
  screen:'login',
  prevScreen:'login',
  navTab:'home',
  showPwd:false,
  email:'s.gratitude@practice.nhs.uk',
  pwd:'',
  resetEmail:'',
  offerOpen:false,
  editProfile:false,
  activeTab:'month',
  notifs:{email:true,sms:false,inApp:true},
  profile:{
    name:'Dr. Sarah Gratitude',
    org:"Dr. Gratitude's Medical Practice",
    email:'s.gratitude@practice.nhs.uk',
    phone:'+44 20 7946 0958',
    address:'12 Harley Street, London W1G 9PQ',
    vat:'GB 123 4567 89',
  },
};

function go(screen,isNav=false){
  S.prevScreen=S.screen;
  if(isNav) S.navTab=screen;
  S.screen=screen;
  render();
}

// ─── HELPERS ─────────────────────────────────────────────
function logo(light=false){
  const c=light?'#fff':'#002B5C';
  return `<div style="display:flex;align-items:center;gap:9px">
    <svg width="20" height="24" viewBox="0 0 20 24" fill="none">
      <path d="M10 0L0 9h5L1 18.5H8V24h4v-5.5h7L15 9h5L10 0Z" fill="${c}"/>
    </svg>
    <span style="font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;color:${c};letter-spacing:0.01em">Elsevier</span>
  </div>`;
}

function statusBar(light=false){
  const c=light?'rgba(255,255,255,0.7)':'#6B7280';
  const tc=light?'#fff':'#1A1F36';
  return `<div class="status-bar" style="padding-top:10px">
    <span style="font-size:13px;font-weight:600;color:${tc}">9:41</span>
    <div style="display:flex;align-items:center;gap:5px">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="${c}"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="${c}"/><rect x="9" y="0" width="3" height="12" rx="1" fill="${c}"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="${c}" opacity=".35"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="${c}" stroke="none"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0" y="1" width="22" height="10" rx="3" stroke="${c}" stroke-width="1.5"/><rect x="1.5" y="2.5" width="15" height="7" rx="1.5" fill="${c}"/><path d="M23 4.5v3a1.5 1.5 0 0 0 0-3z" fill="${c}"/></svg>
    </div>
  </div>`;
}

function bottomNav(){
  const tabs=[
    {id:'home',icon:'home',label:'Home'},
    {id:'invoices',icon:'file',label:'Invoices'},
    {id:'usage',icon:'bar',label:'Usage'},
    {id:'settings',icon:'cog',label:'Settings'},
    {id:'support',icon:'help',label:'Support'},
  ];
  return `<div class="bottom-nav">
    ${tabs.map(t=>{
      const active=S.navTab===t.id;
      const col=active?'#FF6900':'#9CA3AF';
      return `<button class="nav-btn" onclick="go('${t.id}',true)">
        ${active?`<div class="nav-pip"></div>`:''}
        ${svg(t.icon,21,col,active?2.2:1.6)}
        <span class="nav-label" style="color:${col};font-weight:${active?700:400}">${t.label}</span>
      </button>`;
    }).join('')}
  </div>`;
}

function backHeader(title,target,rightHtml=''){
  return `<div style="height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10">
    <button onclick="go('${target}')" style="display:flex;align-items:center;gap:3px;color:var(--navy);font-size:14px;font-weight:600;min-width:60px">
      ${svg('chevL',20,'#002B5C',2)} Back
    </button>
    <span style="font-family:'Libre Baskerville',serif;font-size:15px;font-weight:700;color:var(--text)">${title}</span>
    <div style="min-width:60px;display:flex;justify-content:flex-end">${rightHtml}</div>
  </div>`;
}

function toggle(key,ns='notifs'){
  const on=ns==='notifs'?S.notifs[key]:false;
  const bg=on?'#FF6900':'#E4E7ED';
  return `<button class="toggle" style="background:${bg}" onclick="S.notifs['${key}']=!S.notifs['${key}'];render()">
    <div class="toggle-thumb" style="transform:translateX(${on?20:0}px)"></div>
  </button>`;
}

// ─── SCREENS ─────────────────────────────────────────────

function screenLogin(){

    <!-- bg circles -->
    <div style="position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:rgba(255,105,0,0.1);pointer-events:none"></div>
    <div style="position:absolute;top:180px;left:-100px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none"></div>

    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 0 20px;position:relative;z-index:1">
      ${logo(true)}
      <div style="margin-top:10px;display:flex;align-items:center;gap:6px">
        <div style="width:28px;height:1px;background:rgba(255,255,255,0.2)"></div>
        <span style="color:rgba(255,255,255,0.4);font-size:10px;font-weight:600;letter-spacing:0.18em">CUSTOMER PORTAL</span>
        <div style="width:28px;height:1px;background:rgba(255,255,255,0.2)"></div>
      </div>
    </div>

    <div style="background:#fff;border-radius:28px 28px 0 0;padding:28px 22px 30px;position:relative;z-index:1;flex-shrink:0">
      <h2 style="font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px">Welcome back</h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Sign in to manage your subscriptions</p>

      <div style="margin-bottom:13px">
        <label style="display:block;font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:5px">EMAIL ADDRESS</label>
        <div class="field-wrap">
          ${svg('mail',15,'#9CA3AF')}

      </div>

      <div style="margin-bottom:6px">

          ${svg('lock',15,'#9CA3AF')}
          <input type="${S.showPwd?'text':'password'}" id="pi" value="${S.pwd}" oninput="S.pwd=this.value" placeholder="Enter password"/>

      <div style="text-align:right;margin-bottom:22px">
        <button onclick="go('forgot')" style="color:var(--orange);font-size:13px;font-weight:600">Forgot password?</button>
      </div>

      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:18px">
        Need help? <span onclick="go('support',true)" style="color:var(--orange);font-weight:600;cursor:pointer">Contact support</span>
      </p>
    </div>
  </div>`;
}

function screenForgot(){
  return `
  <div style="flex:1;background:#fff;display:flex;flex-direction:column;">
    ${statusBar()}
    ${backHeader('Reset Password','login')}
    <div class="scroll" style="padding:28px 22px">
      <div style="width:56px;height:56px;border-radius:18px;background:rgba(255,105,0,0.1);display:flex;align-items:center;justify-content:center;margin-bottom:22px">
        ${svg('lock',26,'#FF6900')}
      </div>
      <h2 style="font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px">Forgot your password?</h2>
      <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:28px">Enter the email address linked to your account and we'll send you a secure reset link.</p>

      <label style="display:block;font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:5px">EMAIL ADDRESS</label>
      <div class="field-wrap" style="margin-bottom:22px">
        ${svg('mail',15,'#9CA3AF')}
        <input type="email" value="${S.resetEmail}" oninput="S.resetEmail=this.value" placeholder="your@email.com"/>
      </div>

      <button class="btn-primary" style="background:linear-gradient(135deg,#002B5C,#00407A);box-shadow:0 8px 24px rgba(0,43,92,0.3)" onclick="go('sent')">
        Send Reset Link
      </button>
    </div>

                <div style="flex:1;height:${sh}px;border-radius:4px 4px 0 0;background:rgba(0,43,92,0.65)"></div>
              </div>
              <span style="font-size:9px;color:var(--muted);margin-top:5px">${m}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Top articles -->
      <div class="card" style="padding:16px">
        <p class="sec-head">TOP ARTICLES THIS MONTH</p>
        ${topArticles.map(({t,s,n})=>`
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:13px">
          <div style="flex:1">
            <p style="font-size:12px;font-weight:600;color:var(--text);line-height:1.4">${t}</p>
            <p style="font-size:10px;color:var(--muted);margin-top:2px">${s}</p>
          </div>
          <div style="background:rgba(0,43,92,0.08);border-radius:9px;padding:4px 11px;flex-shrink:0">
            <span style="font-size:13px;font-weight:700;color:var(--navy)">${n}</span>
          </div>
        </div>`).join('')}
      </div>
    </div>
    ${bottomNav()}
  </div>`;
}

function screenSettings(){
  const p=S.profile;
  const ed=S.editProfile;
  function fld(label,key,type='text'){
    return `<div style="margin-bottom:13px">
      <p style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.06em;margin-bottom:4px">${label}</p>
      ${ed
        ?`<input value="${p[key]}" oninput="S.profile['${key}']=this.value;render()" type="${type}" style="width:100%;background:var(--bg);border:1.5px solid rgba(255,105,0,0.5);border-radius:11px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif"/>`
        :`<p style="font-size:13px;font-weight:500;color:var(--text)">${p[key]}</p>`
      }
    </div>`;
  }
  const saveBtn=`<button onclick="S.editProfile=!S.editProfile;render()" style="color:var(--orange);font-size:13px;font-weight:700">${ed?'Save':'Edit'}</button>`;
  return `
  <div style="flex:1;background:var(--bg);display:flex;flex-direction:column;">
    ${statusBar()}
    ${backHeader('Account Settings','home',saveBtn)}
    <div class="scroll" style="padding:14px 16px 90px">
      <!-- Profile card -->
      <div class="card" style="padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:center">
        <div style="width:56px;height:56px;border-radius:18px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="font-family:'Libre Baskerville',serif;font-size:19px;font-weight:700;color:#fff">SG</span>
        </div>
        <div>
          <p style="font-size:15px;font-weight:700;color:var(--text)">${p.name}</p>
          <p style="font-size:11px;color:var(--muted)">Account Administrator</p>
          <span class="badge badge-ok" style="margin-top:5px">${svg('check',9,'#065F46',2.5)} Verified</span>
        </div>
      </div>

      <!-- Profile fields -->
      <div class="card" style="padding:16px;margin-bottom:12px">
        <p class="sec-head">PROFILE</p>
        ${fld('Full Name','name')}${fld('Organisation','org')}${fld('Email Address','email','email')}${fld('Phone Number','phone','tel')}
      </div>

      <!-- Billing -->
      <div class="card" style="padding:16px;margin-bottom:12px">
        <p class="sec-head">BILLING & VAT</p>
        ${fld('Billing Address','address')}
        <div style="display:flex;justify-content:space-between">
          <div><p style="font-size:10px;color:var(--muted);margin-bottom:3px">VAT Number</p><p style="font-size:13px;font-weight:500;color:var(--text)">${p.vat}</p></div>
          <div><p style="font-size:10px;color:var(--muted);margin-bottom:3px">Country</p><p style="font-size:13px;font-weight:500;color:var(--text)">United Kingdom</p></div>
        </div>
      </div>

      <!-- Password -->
      <div class="card" style="padding:16px;margin-bottom:12px">
        <p class="sec-head">SECURITY</p>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div>
            <p style="font-size:13px;font-weight:600;color:var(--text)">Password</p>
            <p style="font-size:11px;color:var(--muted)">Last changed 3 months ago</p>
          </div>
          <button style="color:var(--orange);font-size:13px;font-weight:600">Change</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-size:13px;font-weight:600;color:var(--text)">Two-Factor Auth</p>
            <p style="font-size:11px;color:var(--muted)">Enabled via email</p>
          </div>
          <span class="badge badge-ok">${svg('shield',9,'#065F46',2)} On</span>
        </div>
      </div>

      <!-- Notifications -->
      <div class="card" style="padding:16px;margin-bottom:12px">
        <p class="sec-head">NOTIFICATIONS</p>
        ${[['email','Email Notifications','Renewal reminders & invoices'],['sms','SMS Alerts','Urgent account updates'],['inApp','In-App Notifications','Activity feed & alerts']].map(([k,title,sub])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div><p style="font-size:13px;font-weight:600;color:var(--text)">${title}</p><p style="font-size:11px;color:var(--muted)">${sub}</p></div>
          ${toggle(k)}
        </div>`).join('')}
      </div>

      <!-- Sign out -->
      <button onclick="S.navTab='home';go('login')" style="width:100%;height:48px;border-radius:14px;background:rgba(239,68,68,0.07);border:1.5px solid rgba(239,68,68,0.15);color:#EF4444;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px">
        ${svg('signout',16,'#EF4444',2)} Sign Out
      </button>
    </div>
    ${bottomNav()}
  </div>`;
}

function screenSupport(){
  const faqs=[
    {q:'How do I access my Lancet subscription?',a:'Your subscription is accessible via IP authentication. Visit thelancet.com from your registered practice IP address. For remote access, contact your account manager to set up institutional SSO.'},
    {q:'Can I add more users to my Scopus licence?',a:'Yes — additional concurrent users can be added at any time. Contact your account manager or use the chat below and we\'ll arrange a licence amendment within 2 working days.'},
    {q:'How do I get a VAT receipt?',a:'All VAT receipts are available in the Invoices section of this portal. You can download a PDF of any invoice at any time.'},
    {q:'What happens if my subscription lapses?',a:'Access is suspended immediately on expiry. We\'ll send renewal reminders 90, 60, and 30 days before your renewal date. Contact us if you need a grace period.'},
  ];
  return `
  <div style="flex:1;background:var(--bg);display:flex;flex-direction:column;">
    ${statusBar()}
    ${backHeader('Support','home')}
    <div class="scroll" style="padding:14px 16px 90px">
      <!-- Contact options -->
      <p class="sec-head" style="padding-left:2px">GET IN TOUCH</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${[
          ['phone','Call Us','+44 20 7611 4000','Mon–Fri, 9am–5pm GMT','#002B5C'],
          ['mail','Email Us','customercare@elsevier.com','2 working day response','#FF6900'],
          ['chat','Live Chat','Chat with an agent','Available Mon–Fri','#10B981'],
          ['refresh','Request Callback','We\'ll call you back','Within 1 business day','#8B5CF6'],
        ].map(([ic,title,val,sub,col])=>`
        <div class="card" style="padding:14px;cursor:pointer" onclick="${ic==='chat'?'':''}">
          <div style="width:36px;height:36px;border-radius:11px;background:${col}16;display:flex;align-items:center;justify-content:center;margin-bottom:10px">${svg(ic,17,col,2)}</div>
          <p style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px">${title}</p>
          <p style="font-size:11px;font-weight:500;color:${col};margin-bottom:2px">${val}</p>
          <p style="font-size:10px;color:var(--muted)">${sub}</p>
        </div>`).join('')}
      </div>

      <!-- UK Office -->
      <div class="card" style="padding:15px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start">
        <div style="width:38px;height:38px;border-radius:11px;background:rgba(0,43,92,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${svg('shield',18,'#002B5C')}
        </div>
        <div>
          <p style="font-size:13px;font-weight:700;color:var(--text)">UK & Ireland Account Team</p>
          <p style="font-size:11px;color:var(--muted);line-height:1.6;margin-top:3px">Elsevier Ltd · 125 London Wall · London EC2Y 5AS<br>Registered in England No. 1982084 · VAT GB 494 0527 14</p>
        </div>
      </div>

      <!-- FAQs -->
      <p class="sec-head" style="padding-left:2px">FREQUENTLY ASKED</p>
      ${faqs.map((f,i)=>`
      <div class="card" style="margin-bottom:8px;overflow:hidden">
        <button onclick="S.openFaq=S.openFaq===\${i}?null:\${i};render()" style="width:100%;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;text-align:left">
          <span style="font-size:13px;font-weight:600;color:var(--text);flex:1;padding-right:10px">${f.q}</span>
          <div style="transform:rotate(${S.openFaq===i?90:0}deg);transition:0.2s;flex-shrink:0">${svg('chevR',16,'#9CA3AF',2)}</div>
        </button>
        ${S.openFaq===i?`<div style="padding:0 16px 14px"><p style="font-size:12px;color:var(--muted);line-height:1.7">${f.a}</p></div>`:''}
      </div>`).join('')}
    </div>
    ${bottomNav()}
  </div>`;
}

// ─── RENDER ──────────────────────────────────────────────
const SCREENS={
  login:screenLogin,
  forgot:screenForgot,
  sent:screenSent,
  home:screenHome,
  lancet:()=>subDetail(true),
  scopus:()=>subDetail(false),
  invoices:screenInvoices,
  usage:screenUsage,
  settings:screenSettings,
  support:screenSupport,
};

function render(){
  const app=document.getElementById('app');
  // Remove old screens except notch
  Array.from(app.children).forEach(c=>{if(!c.classList.contains('notch'))app.removeChild(c);});

  const wrap=document.createElement('div');
  wrap.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;top:0;';

  const fn=SCREENS[S.screen];
  if(fn){
    wrap.innerHTML=fn();
    wrap.classList.add('screen','active');
    // Restore input values after render
    setTimeout(()=>{
      const ei=document.getElementById('ei');
      if(ei){ei.value=S.email;}
      const pi=document.getElementById('pi');
      if(pi){pi.value=S.pwd;}
    },0);
  }
  app.appendChild(wrap);
}

// Initial render
S.openFaq=null;
render();
</script>
</body>
</html>
